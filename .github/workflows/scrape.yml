name: Reddit Data Extraction Pipeline

on:
  push:
    branches:
      - master
  schedule:
    # Runs at 14:30 UTC (which is 20:00 / 8:00 PM IST) every day.
    # You can change this using cron syntax (e.g., '0 8 * * *' for 8:00 AM)
    - cron: '30 14 * * *'
  
  # This allows you to trigger the workflow manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    
    # Needs permission to write back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use a modern Node version

      - name: Install Dependencies
        run: npm install

      - name: Run Scraper
        run: npm run scrape:social

      - name: Commit and Push Changes
        run: |
          # Configure Git so it can commit on your behalf
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add the new CSV files inside the csvs directory
          git add csvs/
          
          # We only want to commit if there are actual changes
          # The logic below ensures the workflow doesn't fail if no new data was scraped
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update Reddit Data [$(date +'%Y-%m-%d')]"
          
          # Push the changes back to the main branch
          git push origin HEAD:master
